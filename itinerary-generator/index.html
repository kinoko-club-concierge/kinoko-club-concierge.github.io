<style>
:root {
    --gold: #8B6914;
    --gold-light: #C9A96E;
    --cream: #FDF8EE;
    --dark: #1a2a3a;
    --gray: #6a7a8a;
    --border: #e8e5db;
    --card-bg: rgba(255,255,255,0.85);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Serif JP', 'Source Han Serif SC', 'Hiragino Mincho ProN', Georgia, serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
}
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url('') center/cover no-repeat fixed;
    opacity: 0.08;
    z-index: -1;
}

/* Header */
.header {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0.8rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 0.8rem; }
.header-left img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
.header-left h1 { font-size: 1.1rem; font-weight: 500; color: var(--gold); }

.header-actions { display: flex; gap: 0.6rem; align-items: center; }
.header-actions select, .header-actions button {
    font-family: inherit;
    padding: 0.45rem 0.8rem;
    border-radius: 6px;
    font-size: 0.82rem;
    cursor: pointer;
}
.header-actions select {
    border: 1px solid var(--border);
    background: #fff;
    color: var(--dark);
}
.btn-sm {
    padding: 0.35rem 0.55rem; font-size: 0.75rem;
    border: 1px solid var(--border); border-radius: 6px;
    background: #fff; color: var(--dark); cursor: pointer;
    font-family: inherit;
}
.btn-sm:hover { background: #f5f3ea; }
.header-sep { width: 1px; height: 24px; background: var(--border); display: inline-block; }
.btn { border: none; color: #fff; font-weight: 500; }
.btn-gold { background: var(--gold); }
.btn-gold:hover { background: #7a5a10; }
.btn-outline { background: #fff; border: 1px solid var(--border); color: var(--dark); }
.btn-outline:hover { background: #f5f3ea; }

/* Layout */
.main { display: flex; height: calc(100vh - 56px); }
.editor { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; border-right: 1px solid var(--border); }
.preview { flex: 1; overflow-y: auto; background: #faf9f5; }
.preview-sticky { position: sticky; top: 0; background: #faf9f5; z-index: 10; padding: 1.5rem 2rem 0.5rem; margin: -1.5rem -2rem 0; border-bottom: 1px solid var(--border); }

/* Tour number (internal) */
.tour-number { margin-bottom: 1rem; padding: 0.5rem 0.8rem; background: #f9f6ec; border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; gap: 0.6rem; }
.tour-number .badge { background: #6a7a8a; color: #fff; font-size: 0.65rem; padding: 0.15rem 0.45rem; border-radius: 3px; white-space: nowrap; }
.tour-number input { flex: 1; border: none; background: transparent; font-size: 0.9rem; font-family: inherit; padding: 0.2rem 0; }

/* Calendar Popup */
.cal-popup {

}

.cal-popup .cal-day.selected { background: var(--gold-light); color: #fff; }

.cal-overlay { display: none; position: fixed; inset: 0; z-index: 199; }

/* AI Section */

    <div class="header-actions">
        <button class="btn btn-outline" id="undoBtn" onclick="undo()" title="撤回 Ctrl+Z">↩ 撤回</button>
        <button class="btn btn-outline" id="redoBtn" onclick="redo()" title="重做 Ctrl+Shift+Z">↪ 重做</button>
        <button class="btn btn-outline" id="saveBtn" onclick="saveState()">保存</button>
        <button class="btn btn-gold" id="genLinkBtn" onclick="exportWeb()">🔗 生成链接</button>
        <button class="btn btn-outline" id="exportPDFBtn" onclick="exportPDF()">PDF</button>
        <button class="btn btn-outline" id="exportWordBtn" onclick="exportWord()">Word</button>
        <select id="langSelect" onchange="switchLanguage(this.value)">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="zh-tw">繁體中文</option>
            <option value="ja">日本語</option>
        </select>
    </div>
</div>

<div class="main">
    <!-- Editor Panel -->
    <div class="editor" id="editorPanel">
        <!-- API 密钥由 Apps Script 后台管理，前端不显示 -->

        <!-- Customer Branding -->
        <div class="customer-brand">
            <input type="text" id="clientName" placeholder="" oninput="onClientNameChange(this.value)" class="customer-name-input">
            <div class="logo-upload">
                <img class="preview-img" id="clientLogoPreview" src="">
                <label for="clientLogoInput">上传客户 Logo</label>
                <input type="file" id="clientLogoInput" accept="image/*" onchange="handleLogoUpload(event)">
                <button class="toolbar-item" onclick="clearLogo()" style="font-size:0.75rem">清除</button>
            </div>
        </div>

        <!-- Trip Info -->
        <div class="trip-info">
            <div class="trip-row">
                <label>行程简介</label>
                <input type="text" class="trip-brief" id="tripBrief" value="东京5日奢华游" placeholder="例如：东京5日奢华游" oninput="updateTripInfo()">
            </div>
            <div class="trip-row">
                <label>团号</label>
                <span class="tour-prefix">KNO-</span>
                <input type="text" class="trip-brief" id="tripTourNumber" placeholder="输入团号" oninput="updateTripInfo()">
            </div>
            <div class="trip-row">
                <label>出行人数</label>
                <span class="suffix">成人</span>
                <input type="text" class="trip-num" id="tripAdult" placeholder="0" oninput="updateTripInfo()"><span class="suffix">人</span>
                <span class="suffix">儿童</span>
                <input type="text" class="trip-num" id="tripPax" placeholder="0" oninput="updateTripInfo()"><span class="suffix">人</span>
                <span class="suffix">儿童年龄</span>
                <input type="text" class="trip-num" id="tripKidsAge" placeholder="" oninput="updateTripInfo()" style="width:90px">
            </div>
        </div>

        <!-- Bulk Import -->
        <div class="bulk-import">
            <div class="bulk-header">
                📋 批量导入行程
            </div>
            <div class="bulk-body">
                <div class="bulk-file-zone" id="bulkFileZone">
                    <span class="bulk-file-icon">📂</span>
                    <span>拖拽文件至此，或</span>
                    <label class="toolbar-item">选择文件<input type="file" id="bulkFileInput" accept=".txt,.csv,.pdf,.docx,.xlsx" style="display:none" onchange="handleBulkFile(this)"></label>
                    <span class="bulk-file-hint">支持 TXT · CSV · PDF · Word · Excel</span>
                </div>
                <div class="bulk-divider"><span>或粘贴文字</span></div>
                <textarea id="bulkText" class="bulk-textarea" placeholder="粘贴按天排列的行程文字，例如：&#10;&#10;Day 1 — 4月30日（木）东京&#10;抵达东京机场，专车接机&#10;前往酒店办理入住&#10;晚餐：日式庭院餐厅晚宴&#10;&#10;Day 2 — 5月1日（金）东京&#10;上午：太田伸之交流会&#10;下午：银座香道体验&#10;&#10;支持格式：Day 1 / 第1天 / 1日目 / DAY 1"></textarea>
                <div class="bulk-actions">
                    <button class="toolbar-item" onclick="parseBulkText()">解析并填充</button>
                    <span class="bulk-hint" id="bulkHint"></span>
                </div>
            </div>
        </div>

        <!-- Days -->
        <div id="dayList"></div>
        <button class="add-day" id="addDayBtn" onclick="addDay()">+ 添加一天 / Add Day</button>
    </div>

    <!-- Preview Panel -->
    <div class="preview" id="previewPanel">
        <div class="preview-sticky">
            <div class="preview-title">
                <div id="previewLogo"></div>
                <div class="client-name" id="previewClientName"></div>
            </div>
            <div class="preview-toggle">
                <button class="toggle-btn active" id="toggleClient" onclick="setPreviewMode('client')">客户版</button>
                <button class="toggle-btn" id="toggleInternal" onclick="setPreviewMode('internal')">内部版</button>
            </div>

        </div>
        <div style="padding: 0 0 1.5rem;">
            <div id="previewDays"></div>
            <div class="kinoko-footer">Arranged by Kinoko Club Concierge</div>
        </div>
    </div>
</div>

<!-- Calendar Popup -->
<div class="cal-overlay" id="calOverlay" onclick="closeCalendar()"></div>
<div class="cal-popup" id="calPopup" onclick="event.stopPropagation()">
    <div class="cal-header">
        <button onclick="navCal(-1)">◀</button>

// === 施設検索 (Tavily Search API) ===
async function searchVenueInfo(idx) {
    const day = days[idx];
    const city = day.city || '';
    // Use manual keyword input if filled, otherwise extract from text
    const kwInput = document.getElementById('searchKw' + idx);
    let venueHints = kwInput ? kwInput.value.trim() : '';
    if (!venueHints) {
        const rawText = day.text || day.notes || '';
        // Filter out logistics lines (接送机/前往/入住/晚餐/午餐/酒店/返回)
        const lines = rawText.split(/[\n]/).filter(s => {
            const t = s.trim();
            if (!t) return false;
            if (t.startsWith('-抵达') || t.startsWith('-前往') || t.startsWith('-入住') || t.startsWith('-酒店') || t.startsWith('-返回') || t.startsWith('-出发')) return false;
            return /[館寺園院美術館神社体験塔]/.test(t) || /[a-zA-Z]{3,}/.test(t);
        });
        venueHints = lines.map(l => l.replace(/^[-\d\s.、，：:]+/, '').trim()).join(' ');
        if (!venueHints) venueHints = rawText.split(/[\n,，、。]+/).filter(s => s.trim() && !s.trim().startsWith('-抵达') && !s.trim().startsWith('-前往') && !s.trim().startsWith('-入住') && !s.trim().startsWith('-酒店')).slice(0, 2).join(' ');
    }
    if (!city.trim() && !venueHints.trim()) { alert(t('searchEmpty')); return; }

    const cards = document.querySelectorAll('.day-card');
    const btn = cards[idx]?.querySelector('.search-venue');
    if (btn) { btn.textContent = '⏳ 検索中...'; btn.classList.add('spinning'); }

    try {
        const queryText = '「' + venueHints + '」 ' + city + ' 営業時間 料金 アクセス 日本語で回答してください';
        const resp = await fetch('https://api.tavily.com/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                api_key: TAVILY_KEY,
                query: queryText,
                search_depth: 'advanced',
                include_answer: true,
                max_results: 3
            })
        });
        if (!resp.ok) throw new Error(`Tavily ${resp.status}`);
        const data = await resp.json();
        const answerText = (data.answer || '').trim();
        // Only keep official URL if available in top results
        const officialUrl = Array.isArray(data.results) && data.results.length
            ? data.results.find(r => r.url && (r.url.includes('.co.jp') || r.url.includes('tokyotower') || r.url.includes('gotokyo') || r.url.includes('shibuya')))?.url || ''
            : '';
        if (!answerText && !officialUrl) throw new Error('空応答');
        const text = answerText + (officialUrl ? '\n\n公式URL：' + officialUrl : '');

        const existingNotes = day.notes || '';
        const divider = existingNotes.trim() ? '\n\n---\n\n' : '';
        days[idx].notes = existingNotes + divider + '【施設最新情報】\n' + text;
        days[idx]._activeTab = 'notes';
        renderEditor();
        updatePreview();

        if (btn) { btn.textContent = t('searchBtn'); btn.classList.remove('spinning'); }
    } catch (e) {
        console.error('[Kinoko Search]', e);
        alert(t('searchError') + ': ' + e.message);
        if (btn) { btn.textContent = t('searchBtn'); btn.classList.remove('spinning'); }
    }
}

// === AI 拡写 (DeepSeek direct) ===
async function aiExpandDay(idx) {
    const day = days[idx];
    const framework = (day._activeTab === 'notes' ? day.notes : day.text) || '';
    if (!framework.trim()) { alert('当前页面没有内容，请先输入行程框架'); return; }

    const cards = document.querySelectorAll('.day-card');
    const btn = cards[idx]?.querySelector('.ai-expand');
    if (btn) { btn.textContent = '⏳ 生成中...'; btn.classList.add('spinning'); }

    try {
        const prompt = `你是为高端日本定制旅行品牌 Kinoko Club Concierge 撰写行程的文案。\n\n【写作风格强制要求】\n- 高端、精炼、简洁。每一句都携带事实信息（人名、地名、年代、数字、时长）。\n- 用中短句，单句不超过30字。宁可拆成两句也不写长句。\n- 数字优先：容量、时长、年代、价格——能用数字就不用形容词。\n- 从具象出发：先说地点/人物，再说背景事实，最后说独特之处。\n- 写景用具体元素（木造、苔藓、白砂、光影），不写抽象感受。\n- 介绍型语气，非推销型。用「本次」「由……亲自」「我们安排」开头。\n\n【禁止】\n- 禁止「美轮美奂」「无与伦比」「震撼心灵」「终身难忘」等空洞词\n- 禁止替客人写感受（「您一定会爱上」「令人叹为观止」）\n- 禁止堆砌形容词和感叹号\n- 禁止写长段落散文\n\n【结构要求】\n- 用中文输出\n- 保留原框架的所有项目\n- 每天以时间/动作为锚点展开，列出具体时段\n- 体验内容部分用短语罗列，描述要克制\n- 标题4-12字，有画面感，不用「的地得」\n- 最后附一个「内部备注」区块，用 bullet point 列出需确认事项\n\n行程框架：\n${framework}`;

        const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_KEY}` },
            body: JSON.stringify({ model: 'deepseek-v4-flash', messages: [{ role: 'user', content: prompt }], temperature: 0.7, max_tokens: 4096 })
        });
        if (!resp.ok) throw new Error(`DeepSeek ${resp.status}`);
        const data = await resp.json();
        const result = data.choices?.[0]?.message?.content || '';
        if (!result) throw new Error('空応答');

        const noteMatch = result.match(/内部备注[：:]\s*\n?([\s\S]*)/i);
        let clientText = result;
        let notesText = '';
        if (noteMatch) {
            clientText = result.substring(0, result.indexOf(noteMatch[0])).trim();
            notesText = noteMatch[1].trim();

            ${img.url ? `<button class="img-half-btn" onclick="toggleImageHalf(${i},${j})">${isHalf ? '◫' : '▭'}</button>` : ''}

// === Save & Undo/Redo ===
function getSnapshot() {
    return {
        days: JSON.parse(JSON.stringify(days)),
        tripInfo: JSON.parse(JSON.stringify(tripInfo)),
        clientLogoData: clientLogoData,
        clientName: document.getElementById('clientName')?.value || ''
    };
}

function pushHistory(force) {
    const now = Date.now();
    if (!force && now - lastHistTime < 800) return;
    lastHistTime = now;
    if (historyIndex < historyStack.length - 1) {
        historyStack = historyStack.slice(0, historyIndex + 1);
    }
    historyStack.push(getSnapshot());
    if (historyStack.length > MAX_HISTORY) { historyStack.shift(); } else { historyIndex++; }
    if (historyIndex >= MAX_HISTORY) historyIndex = historyStack.length - 1;
}

function undo() {
    if (historyIndex <= 0) return;
    historyIndex--;
    restoreSnapshot(historyStack[historyIndex]);
}

function redo() {
    if (historyIndex >= historyStack.length - 1) return;
    historyIndex++;
    restoreSnapshot(historyStack[historyIndex]);
}

function restoreSnapshot(s) {
    days = JSON.parse(JSON.stringify(s.days));
    tripInfo = JSON.parse(JSON.stringify(s.tripInfo));
    clientLogoData = s.clientLogoData || '';
    const cn = document.getElementById('clientName');
    if (cn) cn.value = s.clientName || '';
    // Update trip info fields
    if (document.getElementById('tripBrief')) document.getElementById('tripBrief').value = tripInfo.brief || '';
    if (document.getElementById('tripAdult')) document.getElementById('tripAdult').value = tripInfo.adult || '';
    if (document.getElementById('tripPax')) document.getElementById('tripPax').value = tripInfo.kidsCount || '';
    if (document.getElementById('tripKidsAge')) document.getElementById('tripKidsAge').value = tripInfo.kidsAge || '';
    if (document.getElementById('tripTourNumber')) document.getElementById('tripTourNumber').value = tripInfo.tourNum || '';
    // Logo preview
    const lp = document.getElementById('clientLogoPreview');
    if (lp) { lp.src = clientLogoData || ''; lp.style.display = clientLogoData ? 'inline' : 'none'; }
    renderEditor();
    updatePreview();
    autoSave();
}

function updateUndoRedoButtons() {

function setupBulkDrop() {

    if (!zone) return;
    ['dragenter','dragover','dragleave','drop'].forEach(ev => {
        zone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); });
    });
    ['dragenter','dragover'].forEach(ev => zone.addEventListener(ev, () => zone.classList.add('dragover')));
    ['dragleave','drop'].forEach(ev => zone.addEventListener(ev, () => zone.classList.remove('dragover')));
    zone.addEventListener('drop', e => {
        const files = e.dataTransfer.files;

    });
}

function handleBulkFile(input) {
    if (input.files.length > 0) processBulkFile(input.files[0]);
    input.value = '';
}

function processBulkFile(file) {
    const hint = document.getElementById('bulkHint');
    hint.textContent = '读取文件中…';
    const ext = file.name.split('.').pop().toLowerCase();
    const reader = new FileReader();

    const parseText = (text) => {
        document.getElementById('bulkText').value = text;
        hint.textContent = '✓ 已读取，点击「解析并填充」';
        setTimeout(() => { hint.textContent = ''; }, 3000);
    };

    if (ext === 'txt' || ext === 'csv') {
        reader.onload = e => {
            let text = e.target.result;
            if (ext === 'csv') {
                // Simple CSV: join rows with line breaks, skip header if present
                const lines = text.split(/\r?\n/).filter(l => l.trim());
                text = lines.join('\n');
            }
            parseText(text);
        };
        reader.readAsText(file);
    } else if (ext === 'pdf') {
        reader.onload = async (e) => {
            const typedarray = new Uint8Array(e.target.result);
            try {
                const pdfjsLib = window['pdfjs-dist/build/pdf'];
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument({ data: typedarray }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(it => it.str).join(' ') + '\n';
                }
                parseText(text);
            } catch (err) {
                hint.textContent = 'PDF 解析失败: ' + err.message;
            }
        };
        reader.readAsArrayBuffer(file);
    } else if (ext === 'docx') {
        reader.onload = async (e) => {
            try {
                const result = await mammoth.extractRawText({ arrayBuffer: e.target.result });
                parseText(result.value);
            } catch (err) {
                hint.textContent = 'Word 解析失败: ' + err.message;
            }
        };
        reader.readAsArrayBuffer(file);
    } else if (ext === 'xlsx') {
        reader.onload = (e) => {
            try {
                const wb = XLSX.read(e.target.result, { type: 'array' });
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const csv = XLSX.utils.sheet_to_csv(sheet);
                parseText(csv);
            } catch (err) {
                hint.textContent = 'Excel 解析失败: ' + err.message;
            }
        };
        reader.readAsArrayBuffer(file);
    } else {
        hint.textContent = '不支持的文件格式';
    }
}

function parseBulkText() {
    const raw = document.getElementById('bulkText').value.trim();
    if (!raw) { document.getElementById('bulkHint').textContent = '请先粘贴行程文字'; return; }

    // Assemble all day markers into one ordered list
    const dayMarkers = findDayMarkers(raw);
    if (dayMarkers.length === 0) { document.getElementById('bulkHint').textContent = '未识别到日期或 Day 标记'; return; }

    // Build segments
    const segments = [];
    for (let i = 0; i < dayMarkers.length; i++) {
        const start = dayMarkers[i].idx + dayMarkers[i].text.length;
        const end = i + 1 < dayMarkers.length ? dayMarkers[i + 1].idx : raw.length;
        segments.push(dayMarkers[i].text + '\n' + raw.slice(start, end).trim());
    }

    const parsed = segments.map(seg => parseDaySegment(seg));
    pushHistory(true);
    days = parsed;
    autoSave();
    renderEditor();
    updatePreview();
    document.getElementById('bulkHint').textContent = `✓ 已解析 ${parsed.length} 天`;
    setTimeout(() => { document.getElementById('bulkHint').textContent = ''; }, 3000);
}

function findDayMarkers(raw) {
    const results = [];
    // Build a single combined regex that matches all patterns at once
    const patterns = [
        // Day X / DAY X / day x (English)
        '(?:^|\n)\s*(Day|DAY|day)\s*(\\d+)\\s*',
        // D1 / D2 / d1 (letter D)
        '(?:^|\n)\s*[Dd]\\s*(\\d+)\\s*',
        // 第X天 / 第x天
        '(?:^|\n)\s*第\\s*(\\d+)\\s*天',
        // X月X日 / X月X号 (Chinese dates)
        '(?:^|\n)\s*(\\d{1,2})\\s*月\\s*(\\d{1,2})\\s*[日号]',
        // X-X / X/X (numeric dates, like 4-1 or 4/1)
        '(?:^|\n)\s*(\\d{1,2})\\s*[-\\/]\\s*(\\d{1,2})\\s*(?!\\d)',
        // X日目 (Japanese)
        '(?:^|\n)\s*(\\d+)\\s*日目',
    ];

    // Collect all matches with positions
    const matches = [];
    patterns.forEach((pat, pi) => {
        const re = new RegExp(pat, 'gi');
        let m;
        while ((m = re.exec(raw)) !== null) {
            const full = m[0];
            const startIdx = raw.indexOf(full, m.index);
            // Determine the display text based on pattern type
            let text = full.trim();
            // For numeric date patterns, normalize
            if (pi === 4) { // X-X or X/X
                const month = m[1], md = m[2];
                text = `${month}月${md}日`;
            } else if (pi === 3) { // X月X日/号
                text = `${m[1]}月${m[2]}日`;
            } else if (pi === 1) { // D1
                text = `D${m[1]}`;
            }
            matches.push({ idx: startIdx, text, endIdx: startIdx + full.length });
        }
    });

    // Sort by position and deduplicate overlapping matches (keep earlier, longer)
    matches.sort((a, b) => a.idx - b.idx || b.text.length - a.text.length);
    const filtered = [];
    for (const m of matches) {
        const last = filtered[filtered.length - 1];
        if (!last || m.idx >= last.idx + last.text.length) {
            filtered.push(m);
        }
    }
    return filtered;
}

function parseDaySegment(seg) {
    let date = '';
    const lines = seg.split('\n');
    // Extract date from first line
    const firstLine = lines[0];
    const dateMatch = firstLine.match(/(\d{1,2})\s*月\s*(\d{1,2})\s*日|(\d{1,2})[\/\-\.](\d{1,2})(?!\d)/);
    if (dateMatch) {
        let ds = dateMatch[0];
        if (/月/.test(ds)) {
            const m3 = ds.match(/(\d{1,2})月(\d{1,2})日/);
            ds = `2026-${String(parseInt(m3[1])).padStart(2,'0')}-${String(parseInt(m3[2])).padStart(2,'0')}`;
        } else if (/^\d{1,2}[\/\-\.]\d{1,2}$/.test(ds)) {
            const parts2 = ds.split(/[\/\-\.]/);
            ds = `2026-${String(parseInt(parts2[0])).padStart(2,'0')}-${String(parseInt(parts2[1])).padStart(2,'0')}`;
        }
        date = ds;
    }
    // Extract city from known names
    let city = '';
    const cityRe = /東京|大阪|京都|名古屋|札幌|福岡|神戸|横浜|軽井沢|箱根|日光|富士山|河口湖|奈良|広島|長崎|金沢|沖縄|仙台|別府|轻井泽/g;
    const cityMatch = seg.match(cityRe);
    if (cityMatch) city = cityMatch[0];
    // Remove header line, keep only content
    const contentLines = [];
    let skipped = false;
    for (const line of lines) {
        if (!skipped && /^(?:Day\s*|DAY\s*|day\s*|第\s*|D\s*)\d+|^\d{1,2}月\d{1,2}[日号]|^\d{1,2}[-\/]\d{1,2}|^\d+日目/i.test(line.trim())) {
            skipped = true; continue;
        }
        contentLines.push(line);
    }
    return { text: contentLines.join('\n').trim(), notes: '', date, city };
}

function buildPreviewImages(d) {
    const images = d.images || [];
    if (images.length === 0) return '';
    const fit = d.imageFit === 'contain' ? 'contain' : 'cover';
    const valid = images.filter(img => img.url);
    if (valid.length === 0) return '';
    return `<div class="preview-img-grid">${valid.map(img => {
        const w = img.half ? 'calc(50% - 0.15rem)' : '100%';
        const pw = img.portrait ? '50%' : '100%';
        return `<div class="preview-img-cell" style="flex:0 0 ${w};min-width:0;border-radius:6px;overflow:hidden;"><img src="${esc(img.url)}" alt="" style="object-fit:${fit};width:${pw};height:auto;border-radius:6px;${img.portrait?'margin:0 auto;':''}"></div>`;
    }).join('')}</div>`;
}

function formatText(text) {
    if (!text) return '';
    return text.split('\n').filter(l => l.trim()).map(l => {
        // Convert URLs to clickable links
        const linked = l.replace(/(https?:\/\/[^\s<>]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
        return `<p>${linked}</p>`;
    }).join('');
}

function exportWeb() {
    const btn = document.getElementById('genLinkBtn');
    const orig = btn?.textContent;
    if (btn) btn.textContent = '生成中…';

    const basePath = location.pathname.replace(/\/?(index\.html)?$/, '').replace(/\/$/, '');
    const data = {
        n: document.getElementById('clientName')?.value || '',
        i: tripInfo,
        d: days.map(d => ({
            t: d.date || '',
            c: d.city || '',
            x: d.text || '',
            o: d.notes || '',
            imgs: (d.images || []).filter(img => img.url).map(img => ({ u: img.url, p: img.portrait || false, h: img.half || false })),
            fit: d.imageFit || 'cover'
        }))
    };

    function onDone(url) {
        navigator.clipboard.writeText(url).then(function() {
            if (btn) { btn.textContent = '✓ 已复制链接'; setTimeout(function() { btn.textContent = orig || '🔗 生成链接'; }, 2000); }
        }).catch(function() {});
        window.open(url, '_blank');
    }

    function longUrl() {
        var json = JSON.stringify(data);
        var compressed = LZString.compressToEncodedURIComponent(json);
        return location.origin + basePath + '/share/?v=71&d=' + compressed;
    }

    // localhost → short link via local server
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        fetch('/api/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(function(res) { return res.json(); })
        .then(function(result) {
            if (result.id) onDone(location.origin + basePath + '/share/?id=' + result.id);
            else onDone(longUrl());
        })
        .catch(function() { onDone(longUrl()); });
        return;
    }

    // deployed → compressed link
    try { onDone(longUrl()); }
    catch(e) { if (btn) btn.textContent = orig || '🔗 生成链接'; }
}

const WEEKDAYS_JP = ['日', '月', '火', '水', '木', '金', '土'];
const WEEKDAYS_EN = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const WEEKDAYS_FR = ['dim', 'lun', 'mar', 'mer', 'jeu', 'ven', 'sam'];
const WEEKDAYS_TW = ['日', '一', '二', '三', '四', '五', '六'];

function formatDateDisplay(dateStr) {
    // Convert YYYY-MM-DD to YYYY/M/D display for Chinese context
    if (!dateStr) return '';
    const parts = dateStr.split('-');
    if (parts.length === 3) return `${parseInt(parts[0])}/${parseInt(parts[1])}/${parseInt(parts[2])}`;
    return dateStr;
}

function getWeekdayInfo(dateStr) {
    const result = { html: '', weekdayText: '', holidayName: '' };
    if (!dateStr || !dateStr.trim()) return result;

    // Try to parse various date formats
    let y, m, d;
    // Support YYYY/MM/DD, YYYY-MM-DD, MM/DD
    const parts = dateStr.split(/[\/\-\.]/);
    if (parts.length === 3) {
        y = parseInt(parts[0]);
        m = parseInt(parts[1]);
        d = parseInt(parts[2]);
    } else if (parts.length === 2) {
        // MM/DD -> assume current year
        const now = new Date();
        y = now.getFullYear();
        m = parseInt(parts[0]);
        d = parseInt(parts[1]);
    } else {
        return result;
    }

    if (isNaN(y) || isNaN(m) || isNaN(d) || m < 1 || m > 12 || d < 1 || d > 31) return result;

    const dt = new Date(y, m - 1, d);
    if (dt.getMonth() !== m - 1) return result; // invalid date

    const dayOfWeek = dt.getDay();

    const weekdayMap = { zh: WEEKDAYS_TW, en: WEEKDAYS_EN, 'zh-tw': WEEKDAYS_TW, ja: WEEKDAYS_JP };
    const curWeekdays = weekdayMap[currentLanguage] || WEEKDAYS_JP;
    const wd = curWeekdays[dayOfWeek];

    let cssClass = 'weekday';
    if (dayOfWeek === 0) cssClass = 'sun';
    else if (dayOfWeek === 6) cssClass = 'sat';

    result.weekdayText = wd;
    result.html = `<span class="day-weekday ${cssClass}">${wd}</span>`;

    // Check holiday
    const dateKey = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (JP_HOLIDAYS[dateKey]) {
        result.holidayName = JP_HOLIDAYS[dateKey];
        result.html += `<span class="day-holiday">🎌 ${result.holidayName}</span>`;
    }

    return result;
}

// === Custom Calendar ===
let calYear = 2026, calMonth = 4, calDayIndex = -1;

function showCalendar(dayIdx, event) {
    event.stopPropagation();
    calDayIndex = dayIdx;
    const cur = days[dayIdx]?.date;
    if (cur && cur.match(/^\d{4}-\d{2}-\d{2}$/)) {
        [calYear, calMonth] = cur.split('-').map(Number);
    } else {
        const now = new Date();
        calYear = now.getFullYear();
        calMonth = now.getMonth() + 1;
    }
    renderCalendar();
    const popup = document.getElementById('calPopup');
    const input = event.target;
    const rect = input.getBoundingClientRect();
    popup.style.left = Math.min(rect.left, window.innerWidth - 280) + 'px';
    popup.style.top = (rect.bottom + 4) + 'px';
    popup.classList.add('show');
    document.getElementById('calOverlay').classList.add('show');
}

function renderCalendar() {
    const firstDay = new Date(calYear, calMonth - 1, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth, 0).getDate();
    const weekdayMap = { zh: WEEKDAYS_TW, en: WEEKDAYS_EN, 'zh-tw': WEEKDAYS_TW, ja: WEEKDAYS_JP };
    const curWeekdays = weekdayMap[currentLanguage] || WEEKDAYS_JP;
    document.getElementById('calWeekdays').innerHTML = curWeekdays.map(w => `<span>${w}</span>`).join('');
    document.getElementById('calMonthYear').textContent = `${calYear}年${calMonth}月`;
    let html = '';
    for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
        const dateKey = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dow = new Date(calYear, calMonth - 1, d).getDay();
        let cls = 'cal-day';
        if (dow === 0) cls += ' sunday';
        if (dow === 6) cls += ' saturday';
        if (JP_HOLIDAYS[dateKey]) cls += ' holiday';
        if (calDayIndex >= 0 && days[calDayIndex]?.date === dateKey) cls += ' selected';
        const hName = JP_HOLIDAYS[dateKey] || '';
        html += `<div class="${cls}" title="${hName}" onclick="selectDate('${dateKey}')">${d}</div>`;
    }
    document.getElementById('calDays').innerHTML = html;
}

function selectDate(dateKey) {
    if (calDayIndex >= 0) {
        pushHistory(true);
        days[calDayIndex].date = dateKey;
        renderEditor();
        updatePreview();
        autoSave();
    }
    closeCalendar();
}

function closeCalendar() {
    document.getElementById('calPopup').classList.remove('show');
    document.getElementById('calOverlay').classList.remove('show');
    calDayIndex = -1;
}

function navCal(delta) {
    calMonth += delta;
    if (calMonth > 12) { calMonth = 1; calYear++; }
    if (calMonth < 1) { calMonth = 12; calYear--; }
    if (calYear < 2025) { calYear = 2025; calMonth = 1; }
    if (calYear > 2027) { calYear = 2027; calMonth = 12; }
    renderCalendar();
}
