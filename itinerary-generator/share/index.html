<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行程 — Kinoko Club Concierge</title>
<style>
:root {
    --gold: #8B6914;
    --gold-light: #C9A96E;
    --cream: #FDF8EE;
    --dark: #1a2a3a;
    --gray: #6a7a8a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Serif JP', 'Source Han Serif SC', Georgia, serif;
    background: var(--cream);
    color: var(--dark);
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem;
    min-height: 100vh;
}
h1 { font-size: 1.3rem; color: var(--dark); font-weight: 500; margin-bottom: 0.2rem; text-align: center; }
.subtitle { font-size: 0.85rem; color: var(--gray); margin-bottom: 1.5rem; text-align: center; }
.trip-info { text-align: center; font-size: 0.82rem; color: var(--gray); margin-bottom: 1rem; }
.trip-info div { margin-top: 0.2rem; }
.day { margin-bottom: 1.5rem; padding-left: 1.5rem; border-left: 2px solid var(--gold-light); }
.day-label { font-size: 0.9rem; color: var(--gold); font-weight: 600; }
.day-location { font-size: 0.82rem; color: var(--gray); margin-top: 0.1rem; }
.day-text { font-size: 0.88rem; line-height: 1.8; color: var(--dark); margin-top: 0.3rem; }
.day-text p { margin-bottom: 0.3rem; }
.day-text a { color: var(--gold); }
.day-images { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.5rem 0; }
.day-images img { border-radius: 6px; display: block; }
.footer { text-align: center; font-size: 0.7rem; color: var(--gray); margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e8e5db; }
.error { text-align: center; color: #d35400; padding: 3rem; font-size: 0.9rem; }
.loading { text-align: center; color: var(--gray); padding: 5rem; }
@media print {
    body { background: #fff; padding: 1rem; }
    .footer { border-top-color: #ccc; }
}
</style>
</head>
<body>
<div id="app"><div class="loading">加载中…</div></div>

<script>
(function() {
    if (typeof LZString === 'undefined') {
        document.getElementById('app').innerHTML = '<div class="error">脚本加载失败，请刷新重试</div>';
        return;
    }

    var params = new URLSearchParams(location.search);
    var id = params.get('id');
    var d = params.get('d');

    function showError(msg) {
        document.getElementById('app').innerHTML = '<div class="error">' + msg + '</div>';
    }

    function renderTrip(data) {

        var html = '';
        html += '<h1>' + esc(data.n || '(Untitled)') + '</h1>';
        html += '<div class="subtitle">Arranged by Kinoko Club Concierge</div>';

        var info = data.i || {};
        var paxParts = [];
        if (info.adult) paxParts.push('成人' + info.adult + '名');
        if (info.kidsCount) paxParts.push('儿童' + info.kidsCount + '名');
        if (info.kidsAge) paxParts[paxParts.length-1] += ' ' + info.kidsAge;
        html += '<div class="trip-info">';
        html += '<div>' + (info.brief || '') + '</div>';
        if (info.tourNum) html += '<div>KNO-' + info.tourNum + '</div>';
        html += '<div style="font-size:0.75rem;">' + (paxParts.length ? paxParts.join(' · ') : '') + '</div>';
        html += '</div>';

        (data.d || []).forEach(function(day, i) {
            html += '<div class="day">';
            html += '<div class="day-label">Day ' + (i + 1) + (day.t ? ' — ' + day.t : '') + '</div>';
            if (day.c) html += '<div class="day-location">📍 ' + day.c + '</div>';
            if (day.imgs && day.imgs.length) {
                var fit = day.fit || 'cover';
                html += '<div class="day-images">';
                day.imgs.forEach(function(img) {
                    var w = img.h ? 'calc(50% - 0.15rem)' : '100%';
                    var pw = img.p ? '50%' : '100%';
                    html += '<div style="flex:0 0 ' + w + ';min-width:0;border-radius:6px;overflow:hidden;' + (img.p ? 'text-align:center;' : '') + '"><img src="' + esc(img.u) + '" alt="" style="object-fit:' + fit + ';width:' + pw + ';height:auto;border-radius:6px;"></div>';
                });
                html += '</div>';
            }
            if (day.x) html += '<div class="day-text">' + formatText(day.x) + '</div>';
            html += '</div>';
        });

        html += '<div class="footer">Arranged by Kinoko Club Concierge</div>';
        document.getElementById('app').innerHTML = html;
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function formatText(text) {
        if (!text) return '';
        return text.split('\n').filter(function(l) { return l.trim(); }).map(function(l) {
            var linked = l.replace(/(https?:\/\/[^\s<>]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
            return '<p>' + linked + '</p>';
        }).join('');
    }

    // --- Main: determine data source ---
    if (id) {
        var retries = 0;
        function loadData() {
            fetch(location.pathname.replace(/\/[^/]*$/, '') + '/../data/' + id + '.json')
                .then(function(res) {
                    if (!res.ok) {
                        if (res.status === 404 && retries < 5) {
                            retries++;
                            setTimeout(loadData, 1500 + retries * 1000);
                            return;
                        }
                        throw new Error('数据不存在 (HTTP ' + res.status + ')');
                    }
                    return res.json();
                })
                .then(function(data) { if (data) renderTrip(data); })
                .catch(function(e) { showError('加载失败：' + e.message); });
        }
        loadData();
        return;
    }

    if (!d) {
        showError('缺少行程数据');
        return;
    }

    try {
        var json;
        // Try standard base64 first (v73+), then lz-string (backward compat)
        try {
            json = decodeURIComponent(escape(atob(decodeURIComponent(d))));
        } catch (_) {
            json = LZString.decompressFromEncodedURIComponent(d);
        }
        if (!json) throw new Error('解压失败——数据可能被截断，请重新生成链接');
        renderTrip(JSON.parse(json));
    } catch (e) {
        showError('解析失败：' + e.message);
    }
})();
</script>
</body>
</html>
